<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon Cry</title>
    <style>
        :root { --primary: #ff453a; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --subtext: #aaaaaa; --correct: #34c759; --wrong: #ff3b30; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #1c1c1e; color: var(--primary); padding: 10px; text-align: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        h1 { margin: 0; font-size: 18px; letter-spacing: 1px; }

        .mode-tabs { display: flex; background: #1c1c1e; padding: 5px; gap: 5px; flex-shrink: 0; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 8px; text-align: center; font-size: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; color: #666; transition: all 0.2s; }
        .tab.active { background: #333; color: var(--primary); }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        
        .mode-section { width: 100%; display: none; flex-direction: column; align-items: center; }
        .mode-section.active { display: flex; }

        /* 識別モード */
        .recorder-row { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 10px; width: 100%; max-width: 340px; min-height: 110px; margin-bottom: 5px; }
        .visualizer-container { flex: 1; height: 90px; background: #0a0a0a; border-radius: 8px; border: 1px solid #2c2c2e; overflow: hidden; }
        #visualizer { width: 100%; height: 100%; display: block; }
        #btn-record { width: 90px; height: 90px; border-radius: 50%; background: var(--primary); border: 5px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
        #btn-record.recording { box-shadow: 0 0 30px rgba(255, 69, 58, 0.4); }
        #status { font-size: 11px; font-weight: bold; color: var(--subtext); text-transform: uppercase; margin-top: 5px; margin-bottom: 15px; }
        
        #result-container { width: 100%; max-width: 340px; }
        .result-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 2px solid var(--primary); margin-bottom: 10px; }
        .pokemon-id { color: #ffffff; font-size: 12px; margin-bottom: 2px; font-weight: bold; }
        .pokemon-name { font-size: 26px; font-weight: bold; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .match-score { font-size: 12px; background: #3a3a3c; padding: 2px 12px; border-radius: 6px; display: inline-block; color: var(--primary); font-weight: bold; }

        .sub-results { display: grid; grid-template-columns: 1fr; gap: 6px; width: 100%; margin-bottom: 10px; }
        .sub-card { background: var(--card); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; border: 1px solid #333; }
        .sub-rank-score { font-size: 10px; color: #ffffff; background: #444; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 8px; min-width: 55px; text-align: center; }
        .sub-id { font-size: 11px; color: #ffffff; font-weight: bold; margin-right: 8px; }
        .sub-name { font-weight: bold; font-size: 20px; color: #ffffff; }

        #res-minor-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 15px; }
        .minor-item { display: flex; align-items: flex-start; gap: 8px; border-bottom: 1px solid #252527; padding-bottom: 5px; }
        .minor-rank-box { width: 24px; height: 34px; background: #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #fff; flex-shrink: 0; }
        .minor-id { font-size: 10px; color: #ffffff; font-weight: bold; opacity: 0.9; }
        .minor-name { font-size: 16px; font-weight: bold; color: #eeeeee; }

        /* クイズモード */
        .quiz-container { width: 100%; max-width: 340px; margin-top: 5px; }
        .quiz-reg-area { width: 100%; background: #1c1c1e; padding: 10px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; box-sizing: border-box; }
        .reg-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        #input-reg-id { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; font-size: 16px; outline: none; }
        #btn-reg-add { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }
        
        .reg-list-title { font-size: 10px; color: #666; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        #reg-pokemon-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 180px; overflow-y: auto; padding-right: 5px; }
        .reg-item { background: #333; font-size: 8px; padding: 6px 4px; border-radius: 6px; color: #eee; display: flex; flex-direction: column; align-items: center; border: 1px solid transparent; cursor: pointer; text-align: center; }
        .reg-item:active { background: #444; }
        .reg-item.newest { border-color: var(--primary); }
        .reg-item-id { font-weight: normal; opacity: 0.7; }
        .reg-item-name { font-weight: bold; font-size: 10px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #btn-quiz-play { width: 80px; height: 80px; border-radius: 50%; background: #333; border: 5px solid #444; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        #btn-quiz-play.playing { border-color: var(--primary); }
        #btn-quiz-play.disabled { opacity: 0.3; cursor: not-allowed; }

        .choice-btn { background: #1c1c1e; padding: 15px; border-radius: 10px; border: 1px solid #333; color: white; font-size: 18px; font-weight: bold; text-align: center; cursor: pointer; margin-bottom: 10px; }
        .choice-btn.correct { background: var(--correct); }
        .choice-btn.wrong { background: var(--wrong); }
        .choice-btn.disabled { opacity: 0.3; cursor: not-allowed; }

        #quiz-feedback { font-size: 18px; font-weight: bold; margin-top: 10px; height: 24px; text-align: center; }
        #btn-next-quiz { margin: 15px auto; background: #333; color: white; padding: 10px 25px; border-radius: 20px; font-weight: bold; border: none; display: none; cursor: pointer; }

        footer { padding: 10px; text-align: center; font-size: 10px; color: #333; flex-shrink: 0; }
        #init-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #progress-bar { width: 70%; height: 4px; background: #1c1c1e; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        #progress-inner { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }
    </style>
</head>
<body>

<header>
    <h1>Pokémon Cry</h1>
</header>

<div class="mode-tabs">
    <div class="tab" onclick="switchMode('id')">IDENTIFY</div>
    <div class="tab active" onclick="switchMode('quiz')">QUIZ</div>
</div>

<main>
    <div id="id-section" class="mode-section">
        <div class="recorder-row">
            <div class="visualizer-container"><canvas id="visualizer"></canvas></div>
            <div id="btn-record"><svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></div>
        </div>
        <div id="status">TAP AND HOLD</div>
        <div id="result-container" style="display:none">
            <div class="result-card">
                <div class="pokemon-id" id="res-id">No.----</div>
                <div class="pokemon-name" id="res-name">---</div>
                <div class="match-score" id="res-score">MATCH: --%</div>
            </div>
            <div class="sub-results">
                <div class="sub-card"><div class="sub-rank-score" id="res-score-2">2nd: --%</div><span class="sub-id" id="res-id-2">No.----</span><span class="sub-name" id="res-name-2">---</span></div>
                <div class="sub-card"><div class="sub-rank-score" id="res-score-3">3rd: --%</div><span class="sub-id" id="res-id-3">No.----</span><span class="sub-name" id="res-name-3">---</span></div>
                <div class="sub-card"><div class="sub-rank-score" id="res-score-4">4th: --%</div><span class="sub-id" id="res-id-4">No.----</span><span class="sub-name" id="res-name-4">---</span></div>
            </div>
            <div id="minor-results" style="padding:10px; background:#151517; border-radius:10px; border:1px solid #2c2c2e; width:100%; box-sizing:border-box;">
                <b style="font-size:10px; color:#666; display:block; margin-bottom:10px; text-align:center;">OTHERS (5 - 10)</b>
                <div id="res-minor-list"></div>
            </div>
        </div>
    </div>

    <div id="quiz-section" class="mode-section active">
        <div class="quiz-reg-area">
            <div class="reg-input-row">
                <input type="number" id="input-reg-id" placeholder="No. (例: 25)" min="1" max="649">
                <button id="btn-reg-add" onclick="addPokemonToQuiz()">追加</button>
            </div>
            <div class="reg-list-title"><span>クイズ対象 (最大30匹 / タップで削除)</span><span id="reg-count">0/30</span></div>
            <div id="reg-pokemon-list"></div>
        </div>
        
        <div class="quiz-container">
            <div id="btn-quiz-play"><svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></div>
            <div class="choices" id="quiz-choices">
                <div class="choice-btn" onclick="checkAnswer(0)">---</div>
                <div class="choice-btn" onclick="checkAnswer(1)">---</div>
                <div class="choice-btn" onclick="checkAnswer(2)">---</div>
            </div>
            <div id="quiz-feedback"></div>
            <button id="btn-next-quiz" onclick="nextQuiz()">NEXT CRY</button>
        </div>
    </div>
</main>

<div id="init-overlay">
    <div id="init-text" style="font-size: 16px; font-weight: bold; letter-spacing: 2px;">START SYSTEM</div>
    <div id="progress-bar"><div id="progress-inner"></div></div>
    <div id="progress-percent" style="margin-top:8px; font-size:12px;">0%</div>
</div>

<footer>&copy; Pokémon Cry System</footer>

async function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME); };
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e);
    });
}

async function extractV5Fingerprint(audioBuffer) {
    const data = audioBuffer.getChannelData(0);
    const stepSize = Math.floor(audioBuffer.sampleRate * 0.025); 
    const windowSize = Math.floor(audioBuffer.sampleRate * 0.05); 
    const fingerprint = [];
    let prevRMS = 0;
    for (let i = 0; i < data.length - windowSize; i += stepSize) {
        const frame = data.slice(i, i + windowSize);
        let sumSq = 0; for (let j = 0; j < frame.length; j++) sumSq += frame[j] * frame[j];
        const rms = Math.sqrt(sumSq / frame.length);
        let zc = 0; for (let j = 1; j < frame.length; j++) { if ((frame[j] >= 0 && frame[j-1] < 0) || (frame[j] < 0 && frame[j-1] >= 0)) zc++; }
        const brightness = zc / frame.length;
        const flux = Math.abs(rms - prevRMS); prevRMS = rms;
        fingerprint.push({ e: rms, b: brightness, f: flux });
    }
    const maxE = Math.max(...fingerprint.map(p => p.e)) || 1;
    const maxF = Math.max(...fingerprint.map(p => p.f)) || 1;
    return fingerprint.map(p => ({ e: p.e / maxE, b: p.b, f: p.f / maxF }));
}

async function prepareData() {
    const db = await initDB();
    const ids = Object.keys(POKEMON_DB);
    let loadedCount = 0;
    for (const id of ids) {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const cached = await new Promise(r => { const req = tx.objectStore(STORE_NAME).get(id); req.onsuccess = () => r(req.result); });
        if (cached) { signatures[id] = cached; } else {
            try {
                const resp = await fetch(`${BASE_URL}${id}.${POKEMON_DB[id].ext}`);
                const audioBuffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
                const sig = await extractV5Fingerprint(audioBuffer);
                db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(sig, id);
                signatures[id] = sig;
            } catch (e) { console.warn(`Load failed: ${id}`); }
        }
        loadedCount++;
        const percent = Math.floor((loadedCount / ids.length) * 100);
        progressInner.style.width = `${percent}%`; progressPercent.innerText = `${percent}%`;
    }
    initOverlay.style.display = 'none';
}

function switchMode(mode) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.mode-section').forEach(s => s.classList.remove('active'));
    if (mode === 'id') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('id-section').classList.add('active');
    } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('quiz-section').classList.add('active');
        updateQuizUI();
    }

function addPokemonToQuiz() {
    const input = document.getElementById('input-reg-id');
    let id = input.value.trim().padStart(4, '0');
    if (!POKEMON_DB[id]) { alert("無効な番号です。"); return; }
    const idx = registeredQuizIds.indexOf(id);
    if (idx !== -1) registeredQuizIds.splice(idx, 1);
    registeredQuizIds.push(id);
    if (registeredQuizIds.length > 30) registeredQuizIds.shift(); // 30匹まで拡張
    renderRegisteredList();
    input.value = "";
    updateQuizUI();
}

function removePokemonFromQuiz(id) {
    const idx = registeredQuizIds.indexOf(id);
    if (idx !== -1) {
        registeredQuizIds.splice(idx, 1);
        renderRegisteredList();
        updateQuizUI();
    }
}

function renderRegisteredList() {
    const listEl = document.getElementById('reg-pokemon-list');
    const countEl = document.getElementById('reg-count');
    listEl.innerHTML = "";
    registeredQuizIds.forEach((id, i) => {
        const item = document.createElement('div');
        item.className = 'reg-item' + (i === registeredQuizIds.length - 1 ? ' newest' : '');
        item.onclick = () => removePokemonFromQuiz(id);
        item.innerHTML = `<span class="reg-item-id">${id}</span><span class="reg-item-name">${POKEMON_DB[id].name}</span>`;
        listEl.appendChild(item);
    });
    countEl.innerText = `${registeredQuizIds.length}/30`;
}

function updateQuizUI() {
    const btnPlay = document.getElementById('btn-quiz-play');
    const choiceBtns = document.querySelectorAll('.choice-btn');
    const feedback = document.getElementById('quiz-feedback');
    if (registeredQuizIds.length < 3) {
        btnPlay.classList.add('disabled');
        choiceBtns.forEach(b => { b.classList.add('disabled'); b.innerText = "---"; });
        feedback.innerText = "3匹以上登録してください";
        feedback.style.color = "var(--primary)";
    } else {
        btnPlay.classList.remove('disabled');
        choiceBtns.forEach(b => b.classList.remove('disabled'));
        if (feedback.innerText === "3匹以上登録してください") {
            feedback.innerText = "準備完了！";
            nextQuiz();
        }
        if (quizCorrectId === "") nextQuiz();
    }
}

function nextQuiz() {
    if (registeredQuizIds.length < 3) return;
    const allIds = Object.keys(POKEMON_DB);
    quizCorrectId = registeredQuizIds[Math.floor(Math.random() * registeredQuizIds.length)];
    let distractors = [];
    while(distractors.length < 2) {
        let d = allIds[Math.floor(Math.random() * allIds.length)];
        if (d !== quizCorrectId && !distractors.includes(d)) distractors.push(d);
    }
    quizChoices = [quizCorrectId, ...distractors].sort(() => Math.random() - 0.5);
    const choiceButtons = document.querySelectorAll('.choice-btn');
    quizChoices.forEach((id, index) => {
        choiceButtons[index].innerText = POKEMON_DB[id].name;
        choiceButtons[index].className = 'choice-btn';
    });
    document.getElementById('quiz-feedback').innerText = "";
    document.getElementById('btn-next-quiz').style.display = 'none';
    document.getElementById('btn-quiz-play').className = '';
}

async function playQuizCry() {
    if (registeredQuizIds.length < 3) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const btn = document.getElementById('btn-quiz-play');
    if (btn.classList.contains('playing')) return;
    btn.classList.add('playing');
    try {
        const resp = await fetch(`${BASE_URL}${quizCorrectId}.${POKEMON_DB[quizCorrectId].ext}`);
        const audioBuffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioCtx.destination);
        source.onended = () => btn.classList.remove('playing');
        source.start(0);
    } catch (e) { btn.classList.remove('playing'); }
}

function checkAnswer(index) {
    if (registeredQuizIds.length < 3 || document.getElementById('btn-next-quiz').style.display === 'block') return;
    const choiceButtons = document.querySelectorAll('.choice-btn');
    const feedback = document.getElementById('quiz-feedback');
    if (quizChoices[index] === quizCorrectId) {
        choiceButtons[index].classList.add('correct');
        feedback.innerText = "CORRECT! ✨"; feedback.style.color = "var(--correct)";
    } else {
        choiceButtons[index].classList.add('wrong');
        feedback.innerText = "WRONG... 😢"; feedback.style.color = "var(--wrong)";
        quizChoices.forEach((id, i) => { if (id === quizCorrectId) choiceButtons[i].classList.add('correct'); });
    }
    document.getElementById('btn-next-quiz').style.display = 'block';
}

document.getElementById('btn-quiz-play').addEventListener('click', playQuizCry);

// 識別ロジック
let mediaRecorder, recordedChunks = [], isDrawing = false;
async function startRecording() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    waveDataArray = new Uint8Array(analyser.frequencyBinCount);
    waveHistory = []; recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        isDrawing = false;
        const audioBuffer = await audioCtx.decodeAudioData(await (new Blob(recordedChunks)).arrayBuffer());
        identifyPokemon(await extractV5Fingerprint(audioBuffer));
    };
    mediaRecorder.start();
    isDrawing = true;
    btnRecord.classList.add('recording'); statusEl.innerText = "LISTENING...";
    resultContainer.style.display = 'none'; drawWave();
}

function drawWave() {
    if (!isDrawing) return;
    animationId = requestAnimationFrame(drawWave);
    analyser.getByteTimeDomainData(waveDataArray);
    let max = 0;
    for(let i=0; i<waveDataArray.length; i++) { const v = Math.abs(waveDataArray[i] - 128); if(v > max) max = v; }
    waveHistory.push(max);
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.beginPath(); canvasCtx.strokeStyle = '#ff453a'; canvasCtx.lineWidth = 1.5;
    const midY = canvas.height / 2;
    for(let i=0; i<waveHistory.length; i++) {
        const x = (i / waveHistory.length) * canvas.width;
        const h = Math.min(canvas.height / 2 - 2, (waveHistory[i] / 128) * (canvas.height * 2.5));
        canvasCtx.moveTo(x, midY - h); canvasCtx.lineTo(x, midY + h);
    }
    canvasCtx.stroke();
}

function stopRecording() { if (mediaRecorder && mediaRecorder.state !== 'inactive') { mediaRecorder.stop(); btnRecord.classList.remove('recording'); statusEl.innerText = "IDENTIFYING..."; } }

function trimSilence(sig) {
    let s = 0; while (s < sig.length && sig[s].e < 0.05) s++;
    let e = sig.length - 1; while (e > s && sig[e].e < 0.05) e--;
    return s > e ? [] : sig.slice(s, e + 1);
}

function compareFingerprints(sig1, sig2) {
    const s1 = trimSilence(sig1), s2 = trimSilence(sig2);
    if (s1.length === 0 || s2.length === 0) return 10.0;
    let sh = s1.length < s2.length ? s1 : s2, lg = s1.length < s2.length ? s2 : s1, minD = Infinity;
    for (let o = 0; o <= lg.length - sh.length; o++) {
        let d = 0; for (let i = 0; i < sh.length; i++) {
            const de = sh[i].e - lg[o + i].e; const db = sh[i].b - lg[o + i].b; const df = sh[i].f - lg[o + i].f;
            d += (de * de * 1.5) + (db * db * 2.0) + (df * df * 1.0);
        }
        d = Math.sqrt(d / sh.length); if (d < minD) minD = d;
    }
    return 100 * Math.exp(-minD * 1.2);
}

function identifyPokemon(inputSig) {
    let matches = Object.keys(signatures).map(id => ({ id, score: compareFingerprints(inputSig, signatures[id]) }));
    matches.sort((a, b) => b.score - a.score);
    if (matches.length > 0) {
        const top = matches[0];
        const displayScore = Math.floor(Math.min(99, top.score + 15));
        resId.innerText = `No.${top.id}`; resName.innerText = POKEMON_DB[top.id].name; resScore.innerText = `MATCH: ${displayScore}%`;
        const subs = [ { n: resName2, s: resScore2, i: resId2, l: "2nd" }, { n: resName3, s: resScore3, i: resId3, l: "3rd" }, { n: resName4, s: resScore4, i: resId4, l: "4th" } ];
        for (let j = 0; j < subs.length; j++) {
            const m = matches[j + 1];
            if (m) {
                const s = Math.floor(Math.min(displayScore - (j+1)*5, m.score + 10));
                subs[j].n.innerText = POKEMON_DB[m.id].name; subs[j].s.innerText = `${subs[j].l}: ${Math.floor(m.score)}%`; subs[j].i.innerText = `No.${m.id}`;
            }
        }
        resMinorList.innerHTML = "";
        for (let k = 4; k < 10; k++) {
            const m = matches[k];
            if (m) {
                const item = document.createElement('div'); item.className = 'minor-item';
                item.innerHTML = `<div class="minor-rank-box">${k + 1}</div><div class="minor-content"><div class="minor-id">No.${m.id}</div><div class="minor-name">${POKEMON_DB[m.id].name}</div></div>`;
                resMinorList.appendChild(item);
            }
        }
        resultContainer.style.display = 'block'; statusEl.innerText = "ID COMPLETE";
    }
}

btnRecord.addEventListener('mousedown', startRecording); btnRecord.addEventListener('mouseup', stopRecording);
btnRecord.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }); btnRecord.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

window.onload = () => {
    canvas.width = 240; canvas.height = 90;
    initOverlay.addEventListener('click', async () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('init-text').innerText = "CALIBRATING ENGINE v5...";
        prepareData();
    });
};
</script>
