<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POKEMON CRY ID</title>
    <style>
        :root { --primary: #ff453a; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --subtext: #aaaaaa; --accent: #0a84ff; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #1c1c1e; color: var(--primary); padding: 10px; text-align: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        h1 { margin: 0; font-size: 16px; letter-spacing: 2px; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        
        /* 録音エリア：波形とボタンを横並びに */
        .recorder-row { display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 15px; width: 100%; min-height: 120px; margin-bottom: 5px; }
        .visualizer-container { width: 100px; height: 90px; background: #0a0a0a; border-radius: 8px; border: 1px solid #2c2c2e; overflow: hidden; position: relative; }
        #visualizer { width: 100%; height: 100%; }
        
        #btn-record { width: 90px; height: 90px; border-radius: 50%; background: var(--primary); border: 5px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
        #btn-record:active { transform: scale(0.92); }
        #btn-record.recording { box-shadow: 0 0 30px rgba(255, 69, 58, 0.4); border-color: #444; }
        
        #status { font-size: 11px; font-weight: bold; color: var(--subtext); text-transform: uppercase; margin-top: 5px; margin-bottom: 15px; }
        
        #result-container { width: 100%; max-width: 340px; display: none; }
        .result-card { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 2px solid var(--primary); margin-bottom: 10px; box-shadow: 0 4px 20px rgba(255, 69, 58, 0.1); }
        .pokemon-id { color: #ffffff; font-size: 12px; margin-bottom: 2px; font-weight: bold; opacity: 0.9; }
        .pokemon-name { font-size: 26px; font-weight: bold; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .match-score { font-size: 12px; background: #3a3a3c; padding: 2px 12px; border-radius: 6px; display: inline-block; color: var(--primary); font-weight: bold; }

        /* 2位〜4位：強調表示（赤以外） */
        .sub-results { display: grid; grid-template-columns: 1fr; gap: 6px; width: 100%; margin-bottom: 10px; }
        .sub-card { background: var(--card); padding: 8px 12px; border-radius: 8px; display: flex; flex-direction: row; align-items: center; border: 1px solid #333; justify-content: space-between; }
        .sub-rank-score { font-size: 10px; color: #ffffff; background: #444; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 8px; min-width: 55px; text-align: center; }
        .sub-info { display: flex; flex-direction: row; align-items: center; gap: 8px; flex: 1; overflow: hidden; }
        .sub-id { font-size: 11px; color: #ffffff; flex-shrink: 0; font-weight: bold; }
        .sub-name { font-weight: bold; font-size: 20px; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; }

        /* 5位〜10位：簡略表示 */
        #minor-results { padding: 10px; background: #151517; border-radius: 10px; border: 1px solid #2c2c2e; width: 100%; box-sizing: border-box; }
        #minor-results b { font-size: 10px; color: #666; display: block; margin-bottom: 8px; text-align: center; letter-spacing: 1px; }
        #res-minor-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 15px; font-size: 17px; color: #dddddd; font-weight: bold; }
        .minor-item { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; border-bottom: 1px solid #252527; padding-bottom: 2px; }
        .minor-rank { font-size: 11px; color: #ffffff; margin-right: 6px; width: 24px; text-align: center; background: #333; border-radius: 3px; flex-shrink: 0; }
        .minor-id { font-size: 11px; color: #ffffff; margin-right: 6px; font-weight: bold; flex-shrink: 0; }

        footer { padding: 10px; text-align: center; font-size: 10px; color: #333; flex-shrink: 0; }
        
        #init-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #progress-bar { width: 70%; height: 4px; background: #1c1c1e; border-radius: 2px; margin-top: 15px; overflow: hidden; }
        #progress-inner { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }
    </style>
</head>

  "0613": { name: "クマシュン", ext: "mp3" }, "0614": { name: "ツンベアー", ext: "mp3" }, "0615": { name: "フリージオ", ext: "mp3" },
  "0616": { name: "チョボマキ", ext: "mp3" }, "0617": { name: "アギルダー", ext: "mp3" }, "0618": { name: "マッギョ", ext: "mp3" },
  "0619": { name: "コジョフー", ext: "mp3" }, "0620": { name: "コジョンド", ext: "mp3" }, "0621": { name: "クリムガン", ext: "mp3" },
  "0622": { name: "ゴビット", ext: "mp3" }, "0623": { name: "ゴルーグ", ext: "mp3" }, "0624": { name: "コマタナ", ext: "mp3" },
  "0625": { name: "キリキザン", ext: "mp3" }, "0626": { name: "バッフロン", ext: "mp3" }, "0627": { name: "ワシボン", ext: "mp3" },
  "0628": { name: "ウォーグル", ext: "mp3" }, "0629": { name: "バルチャイ", ext: "mp3" }, "0630": { name: "バルジーナ", ext: "mp3" },
  "0631": { name: "クイタラン", ext: "mp3" }, "0632": { name: "アイアント", ext: "mp3" }, "0633": { name: "モノズ", ext: "mp3" },
  "0634": { name: "ジヘッド", ext: "mp3" }, "0635": { name: "サザンドラ", ext: "mp3" }, "0636": { name: "メラルバ", ext: "mp3" },
  "0637": { name: "ウルガモス", ext: "mp3" }, "0638": { name: "コバルオン", ext: "mp3" }, "0639": { name: "テラキオン", ext: "mp3" },
  "0640": { name: "ビリジオン", ext: "mp3" }, "0641": { name: "トルネロス", ext: "mp3" }, "0642": { name: "ボルトロス", ext: "mp3" },
  "0643": { name: "レシラム", ext: "mp3" }, "0644": { name: "ゼクロム", ext: "mp3" }, "0645": { name: "ランドロス", ext: "mp3" },
  "0646": { name: "キュレム", ext: "mp3" }, "0647": { name: "ケルディオ", ext: "mp3" }, "0648": { name: "メロエッタ", ext: "mp3" },

const BASE_URL = 'https://raw.githubusercontent.com/snjarkk/pokecry/main/sound/';
const DB_NAME = 'PokemonCryDB_v2'; 
const STORE_NAME = 'signatures';

let audioCtx;
let signatures = {}; 
const statusEl = document.getElementById('status');
const btnRecord = document.getElementById('btn-record');
const resultContainer = document.getElementById('result-container');
const resId = document.getElementById('res-id'), resName = document.getElementById('res-name'), resScore = document.getElementById('res-score');
const progressInner = document.getElementById('progress-inner'), progressPercent = document.getElementById('progress-percent');
const initOverlay = document.getElementById('init-overlay');

const resName2 = document.getElementById('res-name-2'), resScore2 = document.getElementById('res-score-2'), resId2 = document.getElementById('res-id-2');
const resName3 = document.getElementById('res-name-3'), resScore3 = document.getElementById('res-score-3'), resId3 = document.getElementById('res-id-3');
const resName4 = document.getElementById('res-name-4'), resScore4 = document.getElementById('res-score-4'), resId4 = document.getElementById('res-id-4');
const resMinorList = document.getElementById('res-minor-list');

const canvas = document.getElementById('visualizer');
const canvasCtx = canvas.getContext('2d');
let analyser, waveDataArray, animationId, waveHistory = [];

async function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = e => {
            if (!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME);
        };
        request.onsuccess = e => resolve(e.target.result);
        request.onerror = e => reject(e);
    });
}

async function extractSignature(audioBuffer) {
    const data = audioBuffer.getChannelData(0), step = Math.floor(audioBuffer.sampleRate / 20), sig = [];
    let max = 0;
    for (let i = 0; i < data.length; i += step) {
        let sum = 0;
        for (let j = 0; j < step && (i + j) < data.length; j++) sum += data[i + j] * data[i + j];
        const val = Math.sqrt(sum / step); if (val > max) max = val; sig.push(val);
    }
    return max > 0 ? sig.map(v => v / max) : sig;
}

async function prepareData() {
    const db = await initDB();
    const ids = Object.keys(POKEMON_DB);
    let loadedCount = 0;
    for (const id of ids) {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const cached = await new Promise(r => { const req = tx.objectStore(STORE_NAME).get(id); req.onsuccess = () => r(req.result); });
        if (cached) { signatures[id] = cached; } else {
            try {
                const resp = await fetch(`${BASE_URL}${id}.${POKEMON_DB[id].ext}`);
                const audioBuffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
                const sig = await extractSignature(audioBuffer);
                db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(sig, id);
                signatures[id] = sig;
            } catch (e) { console.warn(`Load failed: ${id}`); }
        }
        loadedCount++;
        const percent = Math.floor((loadedCount / ids.length) * 100);
        progressInner.style.width = `${percent}%`; progressPercent.innerText = `${percent}%`;
    }
    initOverlay.style.display = 'none';
}

let mediaRecorder, recordedChunks = [];

async function startRecording() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    waveDataArray = new Uint8Array(analyser.frequencyBinCount);
    waveHistory = []; recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
    mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        cancelAnimationFrame(animationId); // 描画ループを停止
        const audioBuffer = await audioCtx.decodeAudioData(await (new Blob(recordedChunks)).arrayBuffer());
        identifyPokemon(await extractSignature(audioBuffer));
    };
    mediaRecorder.start();
    btnRecord.classList.add('recording'); statusEl.innerText = "LISTENING...";
    resultContainer.style.display = 'none'; drawWave();
}

function drawWave() {
    animationId = requestAnimationFrame(drawWave);
    analyser.getByteTimeDomainData(waveDataArray);
    let max = 0;
    for(let i=0; i<waveDataArray.length; i++) {
        const v = Math.abs(waveDataArray[i] - 128); if(v > max) max = v;
    }
    waveHistory.push(max);
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.beginPath(); canvasCtx.strokeStyle = '#ff453a'; canvasCtx.lineWidth = 1.5;
    const midY = canvas.height / 2;
    for(let i=0; i<waveHistory.length; i++) {
        const x = (i / waveHistory.length) * canvas.width;
        const h = Math.max(1, (waveHistory[i] / 128) * (canvas.height / 2));
        canvasCtx.moveTo(x, midY - h); canvasCtx.lineTo(x, midY + h);
    }
    canvasCtx.stroke();
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        btnRecord.classList.remove('recording');
        statusEl.innerText = "ANALYZING...";
    }
}

function trimSilence(sig) {
    let s = 0; while (s < sig.length && sig[s] < 0.05) s++;
    let e = sig.length - 1; while (e > s && sig[e] < 0.05) e--;
    return s > e ? [] : sig.slice(s, e + 1);
}

function compareSignatures(sig1, sig2) {
    const s1 = trimSilence(sig1), s2 = trimSilence(sig2);
    if (s1.length === 0 || s2.length === 0) return 0;
    let sh = s1.length < s2.length ? s1 : s2, lg = s1.length < s2.length ? s2 : s1, minD = Infinity;
    for (let o = 0; o <= lg.length - sh.length; o++) {
        let d = 0; for (let i = 0; i < sh.length; i++) { const diff = sh[i] - lg[o + i]; d += diff * diff; }
        d = Math.sqrt(d / sh.length); if (d < minD) minD = d;
    }
    const ratio = sh.length / lg.length;
    return Math.max(0, 100 - minD * 180) * (ratio < 0.4 ? ratio * 2.5 : 1.0);
}

function identifyPokemon(inputSig) {
    let matches = Object.keys(signatures).map(id => ({ id, score: compareSignatures(inputSig, signatures[id]) }));
    matches.sort((a, b) => b.score - a.score);
    if (matches.length > 0 && matches[0].score > 0) {
        const top = matches[0]; resId.innerText = `No.${top.id}`; resName.innerText = POKEMON_DB[top.id].name; resScore.innerText = `MATCH: ${Math.floor(top.score)}%`;
        const subs = [
            { n: resName2, s: resScore2, i: resId2, l: "2nd" },
            { n: resName3, s: resScore3, i: resId3, l: "3rd" },
            { n: resName4, s: resScore4, i: resId4, l: "4th" }
        ];
        for (let j = 0; j < subs.length; j++) {
            const m = matches[j + 1];
            if (m && m.score > 0) {
                subs[j].n.innerText = POKEMON_DB[m.id].name; subs[j].s.innerText = `${subs[j].l}: ${Math.floor(m.score)}%`; subs[j].i.innerText = `No.${m.id}`;
            } else { subs[j].n.innerText = "---"; subs[j].s.innerText = `${subs[j].l}: --%`; subs[j].i.innerText = "No.----"; }
        }
        resMinorList.innerHTML = "";
        for (let k = 4; k < 10; k++) {
            const m = matches[k];
            if (m && m.score > 0) {
                const item = document.createElement('div'); item.className = 'minor-item';
                item.innerHTML = `<span class="minor-rank">${k + 1}</span><span class="minor-id">No.${m.id}</span>${POKEMON_DB[m.id].name}`;
                resMinorList.appendChild(item);
            }
        }
        resultContainer.style.display = 'block'; statusEl.innerText = "ID COMPLETE";
    } else { statusEl.innerText = "COULD NOT ID"; }
}

btnRecord.addEventListener('mousedown', startRecording); btnRecord.addEventListener('mouseup', stopRecording);
btnRecord.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }); btnRecord.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

window.onload = () => {
    canvas.width = 100; canvas.height = 90;
    initOverlay.addEventListener('click', async () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('init-text').innerText = "SYSTEM LOADING...";
        prepareData();
    });
};
</script>
